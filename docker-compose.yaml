version: '3.8'

services:
  trading-data-clickhouse:
    image: trading-data-clickhouse:v1.0.0
    container_name: trading-data-clickhouse
    hostname: trading-data-clickhouse
    ports:
      - "8123:8123"  # HTTP接口
      - "9000:9000"  # 原生TCP接口
      - "9009:9009"  # 原生TCP接口（复制）
    volumes:
      - ./data:/var/lib/clickhouse/
      # - ./config:/etc/clickhouse-server/
      - ./logs:/var/log/clickhouse-server/
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=ponk0132
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - trading-data-clickhouse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  clickhouse-client:
    image: clickhouse/clickhouse-client:latest
    container_name: clickhouse-client
    depends_on:
      - trading-data-clickhouse
    networks:
      - trading-data-clickhouse-network
    profiles:
      - client
    command: 
      - --host=trading-data-clickhouse
      - --port=9000
      - --user=admin
      - --password=ponk0132

networks:
  trading-data-clickhouse-network:
    driver: bridge

volumes:
  trading-data-clickhouse-data:
    driver: local
  trading-data-clickhouse-config:
    driver: local
  trading-data-clickhouse-logs:
    driver: local
